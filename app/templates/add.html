{% extends "base.html" %}
{% block title %}新增血壓記錄{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">新增血壓記錄</h1>

<form method="post" class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-2xl">
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div>
      <label class="block text-sm font-medium mb-1">日期</label>
      <input type="date" name="measure_date" value="{{ today }}" required class="w-full px-3 py-2 border border-slate-300 rounded">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">時段</label>
      <div class="grid grid-cols-2 gap-2">
        <label class="flex items-center justify-center px-4 py-2 border-2 border-blue-500 bg-blue-50 rounded cursor-pointer">
          <input type="radio" name="period" value="AM" checked class="hidden peer">
          <span class="font-medium">上午 AM</span>
        </label>
        <label class="flex items-center justify-center px-4 py-2 border-2 border-slate-300 rounded cursor-pointer">
          <input type="radio" name="period" value="PM" class="hidden peer">
          <span class="font-medium">下午 PM</span>
        </label>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">時刻 (可選)</label>
      <input type="time" name="measure_time" class="w-full px-3 py-2 border border-slate-300 rounded">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">當日氣溫 °C (可選)</label>
      <input type="number" name="temperature_c" step="0.1" min="-10" max="50" class="w-full px-3 py-2 border border-slate-300 rounded">
    </div>
  </div>

  <h2 class="text-lg font-bold mb-3 mt-2">血壓讀數 (留空表示未量)</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for arm, arm_label in [('L', '左手'), ('R', '右手')] %}
      {% for seq in [1, 2] %}
      <div class="border border-slate-200 rounded p-3">
        <div class="font-medium mb-2 text-sm">{{ arm_label }} 第 {{ seq }} 次</div>
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-xs text-slate-500 mb-1">收縮</label>
            <input type="number" name="{{ arm }}{{ seq }}_sys" min="50" max="280" inputmode="numeric" class="w-full px-2 py-1.5 border border-slate-300 rounded text-center">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">舒張</label>
            <input type="number" name="{{ arm }}{{ seq }}_dia" min="30" max="160" inputmode="numeric" class="w-full px-2 py-1.5 border border-slate-300 rounded text-center">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">心跳</label>
            <input type="number" name="{{ arm }}{{ seq }}_pul" min="30" max="220" inputmode="numeric" class="w-full px-2 py-1.5 border border-slate-300 rounded text-center">
          </div>
        </div>
      </div>
      {% endfor %}
    {% endfor %}
  </div>

  <div class="mt-4">
    <label class="block text-sm font-medium mb-1">備註 (可選)</label>
    <textarea name="notes" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded"></textarea>
  </div>

  <div class="flex gap-3 mt-6">
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-medium">儲存</button>
    <a href="{{ url_for('records_list') }}" class="px-6 py-2 rounded border border-slate-300 hover:bg-slate-50">取消</a>
  </div>
</form>

<script>
// AM/PM toggle visual
document.querySelectorAll('input[name="period"]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('input[name="period"]').forEach(rr => {
      const lbl = rr.closest('label');
      if (rr.checked) {
        lbl.classList.add('border-blue-500', 'bg-blue-50');
        lbl.classList.remove('border-slate-300');
      } else {
        lbl.classList.remove('border-blue-500', 'bg-blue-50');
        lbl.classList.add('border-slate-300');
      }
    });
  });
});
</script>

{% endblock %}
