<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}血壓記錄{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="{{ url_for('dashboard') }}" class="font-bold text-lg text-blue-700">血壓記錄</a>
      <div class="flex gap-1 text-sm">
        <a href="{{ url_for('dashboard') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='dashboard' %}bg-blue-100 text-blue-700 font-medium{% endif %}">儀表板</a>
        <a href="{{ url_for('records_list') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='records_list' %}bg-blue-100 text-blue-700 font-medium{% endif %}">記錄</a>
        <a href="{{ url_for('analytics_page') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='analytics_page' %}bg-blue-100 text-blue-700 font-medium{% endif %}">分析</a>
        <a href="{{ url_for('add_record') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='add_record' %}bg-blue-100 text-blue-700 font-medium{% endif %}">新增</a>
        <a href="{{ url_for('export_page') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='export_page' %}bg-blue-100 text-blue-700 font-medium{% endif %}">匯出</a>
        <a href="{{ url_for('reimport_page') }}" class="px-3 py-1.5 rounded hover:bg-blue-50 {% if request.endpoint=='reimport_page' %}bg-blue-100 text-blue-700 font-medium{% endif %}">重匯入</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
