services:
  bp-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bp-tracker:latest
    container_name: bp-tracker
    restart: unless-stopped
    ports:
      - "8080:5000"
    volumes:
      # Mount NAS folder for DB persistence + backups
      # On Synology, change this to e.g. /volume1/docker/bp-tracker/data
      - ./data:/data
    environment:
      - TZ=Asia/Taipei
      - BP_DB_PATH=/data/bp.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
